<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acompanhamento de Pedido - SaaS Food</title>
<!-- BEGIN: External Scripts -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              orange: '#FF5F00',
              blue: '#0052FF',
              dark: '#1A1A1A',
              light: '#F8F9FA'
            }
          }
        }
      }
    }
  </script>
<!-- END: External Scripts -->
<!-- BEGIN: Custom Typography and Layout Styles -->
<style data-purpose="layout">
    body {
      background-color: #F8F9FA;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    .status-active {
      @apply text-brand-orange font-bold;
    }
    .progress-line {
      height: 4px;
      border-radius: 2px;
    }
    /* Simple QR Code placeholder styling */
    .qr-container {
      background: white;
      padding: 1rem;
      border-radius: 1rem;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }
  </style>
<!-- END: Custom Typography and Layout Styles -->
</head>
<body class="flex flex-col min-h-screen text-brand-dark">
<!-- BEGIN: MainHeader -->
<header class="bg-white border-b px-6 py-4 flex items-center justify-between sticky top-0 z-50">
<button aria-label="Voltar" class="p-2 hover:bg-gray-100 rounded-full">
<svg class="w-6 h-6" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m15 18-6-6 6-6"></path></svg>
</button>
<h1 class="text-lg font-semibold">Acompanhar Pedido</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- END: MainHeader -->
<!-- BEGIN: MainContent -->
<main class="flex-grow p-4 space-y-6">
<!-- BEGIN: KioskLocationSection -->
<section class="bg-white rounded-2xl p-4 shadow-sm border border-gray-100 flex items-center space-x-4" data-purpose="location-info">
<div class="bg-brand-blue/10 p-3 rounded-xl text-brand-blue">
<svg class="w-6 h-6" fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
</div>
<div>
<h2 class="font-bold text-gray-900">Sunset Bites</h2>
<p class="text-sm text-gray-500">Setor B - Quiosque principal do evento</p>
</div>
</section>
<!-- END: KioskLocationSection -->
<!-- BEGIN: OrderStatusSection -->
<section class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100" data-purpose="order-status-tracker">
<div class="flex flex-col items-center text-center mb-6">
<span class="text-sm text-gray-500 font-medium uppercase tracking-wider">Tempo estimado</span>
<div class="text-5xl font-black text-brand-orange mt-1">15 min</div>
<p class="text-gray-600 mt-2 font-medium">Seu pedido está sendo preparado!</p>
</div>
<!-- Step Indicator -->
<div class="relative flex justify-between items-center px-2">
<!-- Progress Background Lines -->
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-gray-100 -z-10"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-1 bg-brand-orange -z-10" style="width: 50%;"></div>
<!-- Step 1: Received -->
<div class="flex flex-col items-center">
<div class="w-4 h-4 rounded-full bg-brand-orange ring-4 ring-brand-orange/20"></div>
<span class="text-[10px] mt-2 font-bold text-brand-orange">Recebido</span>
</div>
<!-- Step 2: Preparing -->
<div class="flex flex-col items-center">
<div class="w-4 h-4 rounded-full bg-brand-orange ring-4 ring-brand-orange/20"></div>
<span class="text-[10px] mt-2 font-bold text-brand-orange">Em Preparo</span>
</div>
<!-- Step 3: Ready -->
<div class="flex flex-col items-center">
<div class="w-4 h-4 rounded-full bg-gray-200"></div>
<span class="text-[10px] mt-2 font-medium text-gray-400">Pronto</span>
</div>
</div>
</section>
<!-- END: OrderStatusSection -->
<!-- BEGIN: PickupVerificationSection -->
<section class="flex flex-col items-center justify-center space-y-4" data-purpose="pickup-qr-code">
<div class="qr-container">
<!-- Placeholder for dynamic QR Code -->
<img alt="Código de Retirada QR" class="w-44 h-44 rounded-lg" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPQgmXgOctNNEZQ7oC14UHgmowZTi39wrWY56rfrdzMzc4TpMU-M_ZKFbqS1OJJXZDwACghOF4HUZrASCYY3j2cV-z04SeXoir09UIsav7lzkWdXdFrgW_wHOAJfkMBJlJE2wxW72ampd8Ihon2smPh7-8byFJyLKRLJ4vNCODLkij33trY0OnJe8q82MZQfqxaZ9zJtRN0v0je1xrkPmbYg0dkZ-I1hQRliBo2gnnkJ5AnQ53-et6i09PrEPImHEkG3Y0r_ssNDnQ"/>
</div>
<div class="text-center">
<span class="text-sm text-gray-500 block mb-1">Número do Pedido</span>
<span class="text-3xl font-black text-brand-dark tracking-tighter">#A124</span>
</div>
</section>
<!-- END: PickupVerificationSection -->
<!-- BEGIN: OrderDetailsSection -->
<section class="bg-white rounded-2xl p-5 shadow-sm border border-gray-100" data-purpose="order-summary">
<h3 class="font-bold text-lg mb-4">Resumo do Pedido</h3>
<ul class="space-y-3">
<li class="flex justify-between items-center text-gray-700">
<div class="flex items-center space-x-3">
<span class="w-6 h-6 bg-gray-100 rounded flex items-center justify-center text-xs font-bold">1x</span>
<span>Classic Cheeseburger</span>
</div>
<span class="font-medium">R$ 32,90</span>
</li>
<li class="flex justify-between items-center text-gray-700">
<div class="flex items-center space-x-3">
<span class="w-6 h-6 bg-gray-100 rounded flex items-center justify-center text-xs font-bold">1x</span>
<span>Coca-Cola (Lata)</span>
</div>
<span class="font-medium">R$ 8,00</span>
</li>
</ul>
<hr class="my-4 border-gray-100"/>
<div class="flex justify-between items-center font-bold text-gray-900">
<span>Total</span>
<span>R$ 40,90</span>
</div>
</section>
<!-- END: OrderDetailsSection -->
<!-- BEGIN: ActionButtons -->
<div class="grid grid-cols-2 gap-4 pb-10" data-purpose="customer-actions">
<button class="flex flex-col items-center justify-center bg-white border border-gray-200 p-4 rounded-2xl hover:bg-gray-50 transition-colors">
<svg class="mb-2" fill="none" height="24" stroke="brand-blue" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
<span class="text-sm font-semibold text-brand-blue">Suporte</span>
</button>
<button class="flex flex-col items-center justify-center bg-white border border-gray-200 p-4 rounded-2xl hover:bg-gray-50 transition-colors">
<svg class="mb-2" fill="none" height="24" stroke="gray" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"></path><path d="M16 8h-6"></path><path d="M16 12H8"></path><path d="M10 16H8"></path></svg>
<span class="text-sm font-semibold text-gray-700">Ver Recibo</span>
</button>
</div>
<!-- END: ActionButtons -->
</main>
<!-- END: MainContent -->
<!-- BEGIN: BottomNav -->
<nav class="bg-white border-t border-gray-100 flex justify-around items-center py-3 px-6 pb-8 sticky bottom-0">
<button class="flex flex-col items-center text-gray-400">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
</button>
<button class="flex flex-col items-center text-brand-orange">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg"><circle cx="8" cy="21" r="1"></circle><circle cx="19" cy="21" r="1"></circle><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"></path></svg>
</button>
<button class="flex flex-col items-center text-gray-400">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
</button>
</nav>
<!-- END: BottomNav -->
</body></html>
