<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Food Kiosk Checkout</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<div class="max-w-md mx-auto min-h-screen flex flex-col bg-background-light dark:bg-background-dark">
<!-- Top App Bar -->
<header class="sticky top-0 z-50 bg-background-light dark:bg-background-dark border-b border-primary/10 px-4 py-4 flex items-center gap-4">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold">Checkout</h1>
</header>
<main class="flex-1 overflow-y-auto">
<!-- Order Summary Section -->
<section class="p-4 border-b border-primary/5">
<h2 class="text-lg font-bold mb-4">Order Summary</h2>
<!-- Item 1 -->
<div class="flex items-center gap-4 py-3">
<div class="size-16 rounded-lg bg-cover bg-center shrink-0" data-alt="Juicy classic double cheeseburger with sesame bun" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAYZbwLnz342lw3LT4KkFH_MFsrzdK4bd6bDYzmXX6J1yq9niOfleiI8Vn-ssVUDyuKtFiR1Rbd719FnoAYrPArJ0RWzbQ55lpj-IUKVTGTFPSBLosn4fI8vuizZPZyISoCaUA3KrqA2k5Jy69kVe2itjJDpsjXCbZ6tEr5E19-k1Me8RHthJfH_JRNMgflbYI_3FesXdJMY_mr06Bdh_X7PtEEsIrgaa9tgWw_VXU6sDG4RwIClzXvlkkAXlYBg_-9wsCDxMoqWKNg')"></div>
<div class="flex-1">
<p class="font-semibold">Classic Double Burger</p>
<p class="text-sm text-slate-500 dark:text-slate-400">1x</p>
</div>
<p class="font-medium">$12.00</p>
</div>
<!-- Item 2 -->
<div class="flex items-center gap-4 py-3">
<div class="size-16 rounded-lg bg-cover bg-center shrink-0" data-alt="Cold bottle of classic coca-cola soda" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD0o-HF2R1JFp_GMfKztYi7kkvMQqlOtZ8fzNJnpQwJqmv4iVNmLIVqVSe3KbdewC5aXncAf-zWCR4XFIs2WzjeFj3k64zgQwv5raH3IuUdNWy6QC3Pikk8c-aC409u1YO5nrWhZDIns-oWe7SIsCOkY2hGQEzDW22J9XryS-hXjyW39oqp_W-vheloguOu95BgCvzpCnaXpHrlBhG2G7UFH8Zhv-mYAiOUlc9pMqNruV7ij5zffZ_u8mff5_4o6fydiKhULH8fEHpf')"></div>
<div class="flex-1">
<p class="font-semibold">Coca-Cola</p>
<p class="text-sm text-slate-500 dark:text-slate-400">1x</p>
</div>
<p class="font-medium">$3.50</p>
</div>
</section>
<!-- Coupon Section -->
<section class="p-4 border-b border-primary/5">
<div class="flex flex-col gap-2">
<p class="font-semibold">Coupon</p>
<div class="flex items-stretch rounded-xl overflow-hidden border border-primary/20 bg-white dark:bg-slate-800">
<input class="flex-1 border-none focus:ring-0 bg-transparent px-4 py-3 placeholder:text-slate-400" placeholder="Apply coupon" type="text"/>
<div class="flex items-center justify-center px-4 bg-primary/10 text-primary">
<span class="material-symbols-outlined">sell</span>
</div>
</div>
</div>
</section>
<!-- Payment Methods Section -->
<section class="p-4 border-b border-primary/5">
<h2 class="text-lg font-bold mb-4">Payment Method</h2>
<div class="space-y-3">
<!-- Apple Pay (Selected) -->
<label class="flex items-center gap-4 p-4 rounded-xl border-2 border-primary bg-primary/5 cursor-pointer">
<input checked="" class="text-primary focus:ring-primary size-5" name="payment" type="radio"/>
<span class="material-symbols-outlined text-2xl">ios</span>
<span class="flex-1 font-medium">Apple Pay</span>
<span class="material-symbols-outlined text-primary">check_circle</span>
</label>
<!-- Google Pay -->
<label class="flex items-center gap-4 p-4 rounded-xl border border-primary/10 bg-white dark:bg-slate-800 cursor-pointer">
<input class="text-primary focus:ring-primary size-5" name="payment" type="radio"/>
<span class="material-symbols-outlined text-2xl">google</span>
<span class="flex-1 font-medium">Google Pay</span>
</label>
<!-- Credit Card -->
<label class="flex items-center gap-4 p-4 rounded-xl border border-primary/10 bg-white dark:bg-slate-800 cursor-pointer">
<input class="text-primary focus:ring-primary size-5" name="payment" type="radio"/>
<span class="material-symbols-outlined text-2xl">credit_card</span>
<span class="flex-1 font-medium">Visa •••• 1234</span>
</label>
<!-- Pix -->
<label class="flex items-center gap-4 p-4 rounded-xl border border-primary/10 bg-white dark:bg-slate-800 cursor-pointer">
<input class="text-primary focus:ring-primary size-5" name="payment" type="radio"/>
<span class="material-symbols-outlined text-2xl">qr_code_2</span>
<span class="flex-1 font-medium">Pix</span>
</label>
</div>
</section>
<!-- Totals Section -->
<section class="p-4 space-y-2 mb-24">
<div class="flex justify-between text-slate-600 dark:text-slate-400">
<span>Subtotal</span>
<span>$15.50</span>
</div>
<div class="flex justify-between text-slate-600 dark:text-slate-400">
<span>Service Fee</span>
<span>$1.50</span>
</div>
<div class="flex justify-between text-slate-600 dark:text-slate-400">
<span>Delivery Fee</span>
<span>$2.00</span>
</div>
<div class="flex justify-between font-bold text-lg pt-2 border-t border-primary/10">
<span>Total</span>
<span class="text-primary">$19.00</span>
</div>
</section>
</main>
<!-- Bottom Action Button -->
<footer class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-background-light dark:bg-background-dark border-t border-primary/10">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl flex items-center justify-between px-6 transition-colors shadow-lg shadow-primary/20">
<span>Confirm and Pay</span>
<span>$19.00</span>
</button>
</footer>
</div>
</body></html>
